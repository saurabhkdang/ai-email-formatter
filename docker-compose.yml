version: "3.9"

services:

  ollama:
    image: ollama/ollama
    container_name: ollama
    restart: unless-stopped

    ports:
      - "11434:11434"

    volumes:
      - ollama_data:/root/.ollama

  email-reader:
    image: saurabhdang/email-reader:latest
    container_name: email-reader

    restart: unless-stopped

    ports:
      - "8000:8000"

    environment:
      OLLAMA_BASE_URL: http://ollama:11434

    depends_on:
      - ollama

volumes:
  ollama_data: